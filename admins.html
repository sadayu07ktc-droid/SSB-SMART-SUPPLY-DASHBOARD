<title>สิทธิ์แอดมิน · SSB</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root{
    --bg:#EEF2EE; --surface:#FFFFFF; --surface-2:#F6F8F5; --surface-3:#EDF2ED;
    --ink:#15241D; --ink-soft:#5B6B63; --ink-faint:#8A988F;
    --line:#E1E7E0; --line-strong:#CDD6CD;
    --pine:#0E7C66; --pine-deep:#0A5C4C; --gold:#B7892A;
    --green:#157A40; --green-bg:#DCF3E3;
    --slate:#6B7A70; --slate-bg:#EEF1EE;
    --red:#A91F12; --red-bg:#FBE4E1;
    --admin:#4F46E5; --admin-bg:#EEF0FE;
    --shadow:0 1px 2px rgba(21,36,29,.04), 0 8px 24px rgba(21,36,29,.06);
    --lift:0 18px 50px rgba(10,40,28,.18);
    --sans:'IBM Plex Sans Thai','Noto Sans Thai','Leelawadee UI',system-ui,'Segoe UI',sans-serif;
    --mono:'IBM Plex Mono','Cascadia Mono',ui-monospace,Consolas,monospace;
  }
  @media (prefers-color-scheme: dark){:root{
    --bg:#0D1512;--surface:#152019;--surface-2:#1B2721;--surface-3:#22302A;
    --ink:#E4EDE7;--ink-soft:#A2B3A9;--ink-faint:#75887E;--line:#25332C;--line-strong:#33443B;
    --pine:#3FA98F;--gold:#D7A845;--green:#3FBE72;--green-bg:#123222;--slate:#8A9B91;--slate-bg:#1E2A24;
    --red:#F08A7C;--red-bg:#3A1A16;--admin:#8B85F0;--admin-bg:#1E1C3A;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);--lift:0 18px 50px rgba(0,0,0,.6);}}
  :root[data-theme="dark"]{
    --bg:#0D1512;--surface:#152019;--surface-2:#1B2721;--surface-3:#22302A;
    --ink:#E4EDE7;--ink-soft:#A2B3A9;--ink-faint:#75887E;--line:#25332C;--line-strong:#33443B;
    --pine:#3FA98F;--gold:#D7A845;--green:#3FBE72;--green-bg:#123222;--slate:#8A9B91;--slate-bg:#1E2A24;
    --red:#F08A7C;--red-bg:#3A1A16;--admin:#8B85F0;--admin-bg:#1E1C3A;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);--lift:0 18px 50px rgba(0,0,0,.6);}
  :root[data-theme="light"]{
    --bg:#EEF2EE;--surface:#FFFFFF;--surface-2:#F6F8F5;--surface-3:#EDF2ED;
    --ink:#15241D;--ink-soft:#5B6B63;--ink-faint:#8A988F;--line:#E1E7E0;--line-strong:#CDD6CD;
    --pine:#0E7C66;--gold:#B7892A;--green:#157A40;--green-bg:#DCF3E3;--slate:#6B7A70;--slate-bg:#EEF1EE;
    --red:#A91F12;--red-bg:#FBE4E1;--admin:#4F46E5;--admin-bg:#EEF0FE;}

  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.5}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  :focus-visible{outline:2px solid var(--pine);outline-offset:2px;border-radius:6px}

  header{background:var(--pine-deep);color:#EAF3EF;border-bottom:3px solid var(--gold)}
  .bar{max-width:1080px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#8FC9B9;font-weight:600}
  .bar h1{font-size:20px;font-weight:700}
  .spacer{flex:1}
  .mocktag{font-size:11.5px;color:#0A5C4C;background:#F2D28C;font-weight:700;padding:5px 12px;border-radius:999px}
  main{max-width:1080px;margin:0 auto;padding:20px}

  .hint{display:flex;gap:10px;background:var(--surface-2);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:10px;padding:11px 14px;font-size:13px;color:var(--ink-soft);margin-bottom:18px}
  .hint b{color:var(--ink)}
  .list{display:grid;grid-template-columns:repeat(2,1fr);gap:13px}
  @media(max-width:680px){.list{grid-template-columns:1fr}}

  .card{font-family:inherit;text-align:left;width:100%;background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:15px 16px;display:flex;gap:13px;position:relative;overflow:hidden;cursor:pointer;transition:.14s}
  .card:hover{border-color:var(--pine);transform:translateY(-2px);box-shadow:var(--lift)}
  .card .edge{position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--admin)}
  .avatar{width:44px;height:44px;border-radius:12px;flex:none;display:grid;place-items:center;font-weight:700;font-size:16px;color:#fff;background:var(--admin)}
  .who{flex:1;min-width:0}
  .who .name{font-size:15px;font-weight:600}
  .who .ln{font-size:12px;color:var(--ink-faint);margin-top:2px}
  .tybadge{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;margin-top:6px;background:var(--admin-bg);color:var(--admin);font-family:var(--mono)}
  .caps{margin-top:7px;display:flex;flex-wrap:wrap;gap:4px}
  .cap{font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;background:var(--surface-3);color:var(--ink-soft);border:1px solid var(--line)}
  .cap.on{background:var(--green-bg);color:var(--green);border-color:transparent}
  .go{align-self:center;color:var(--ink-faint);font-size:20px}
  .card:hover .go{color:var(--pine)}

  #scrim{position:fixed;inset:0;background:rgba(9,22,17,.5);opacity:0;pointer-events:none;transition:.22s;z-index:50}
  #scrim.on{opacity:1;pointer-events:auto}
  #dw{position:fixed;top:0;right:0;height:100%;width:560px;max-width:96vw;background:var(--bg);z-index:60;transform:translateX(102%);transition:transform .26s cubic-bezier(.32,.72,0,1);overflow-y:auto;box-shadow:var(--lift)}
  #dw.on{transform:none}
  @media(prefers-reduced-motion:reduce){#dw,#scrim,.card{transition:none}}

  .dwhead{position:sticky;top:0;background:var(--pine-deep);color:#EAF3EF;padding:16px 20px 18px;border-bottom:3px solid var(--gold);z-index:2}
  .dwhead .top{display:flex;gap:12px}
  .dwhead h2{font-size:18px;font-weight:700;flex:1}
  .xbtn{background:rgba(255,255,255,.12);border:1px solid rgba(143,201,185,.4);color:#EAF3EF;width:32px;height:32px;border-radius:9px;font-size:17px;cursor:pointer;flex:none;font-family:inherit}
  .dwhead .sub{font-size:12.5px;color:#BFE3D8;margin-top:5px}

  .sect{padding:18px 20px 0}
  .sect h3{font-size:12px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .sect h3::after{content:"";flex:1;height:1px;background:var(--line)}

  .opt{display:flex;gap:11px;align-items:flex-start;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin-bottom:8px;cursor:pointer;transition:.12s}
  .opt:hover{border-color:var(--pine)}
  .opt.sel{border-color:var(--pine);background:var(--surface-2);box-shadow:inset 3px 0 0 var(--pine)}
  .radio{width:18px;height:18px;border-radius:50%;border:2px solid var(--line-strong);flex:none;margin-top:2px;display:grid;place-items:center}
  .opt.sel .radio{border-color:var(--pine)}
  .opt.sel .radio::after{content:"";width:9px;height:9px;border-radius:50%;background:var(--pine)}
  .opt .t{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
  .opt .code{font-family:var(--mono);font-size:10.5px;font-weight:700;background:var(--admin-bg);color:var(--admin);padding:2px 7px;border-radius:6px}
  .opt .d{font-size:12px;color:var(--ink-soft);margin-top:3px;line-height:1.6}

  .sw{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin-bottom:8px}
  .sw .body{flex:1}
  .sw .t{font-size:14px;font-weight:600}
  .sw .d{font-size:11.5px;color:var(--ink-soft);margin-top:2px;line-height:1.55}
  .sw .val{font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin-top:4px}
  .toggle{width:46px;height:26px;border-radius:999px;background:var(--line-strong);border:none;cursor:pointer;position:relative;flex:none;padding:0;transition:background .18s}
  .toggle.on{background:var(--green)}
  .toggle .knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:left .18s}
  .toggle.on .knob{left:23px}

  .eff{background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .eff .row{display:flex;align-items:center;gap:10px;padding:10px 13px;border-bottom:1px solid var(--line);font-size:13px}
  .eff .row:last-child{border-bottom:0}
  .eff .ic{width:20px;flex:none;text-align:center;font-size:13px}
  .eff .lb{flex:1}
  .eff .st{font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;flex:none}
  .st.y{background:var(--green-bg);color:var(--green)}
  .st.n{background:var(--slate-bg);color:var(--slate)}
  .st.w{background:var(--red-bg);color:var(--red)}

  .warn{display:flex;gap:10px;background:var(--red-bg);border:1px solid transparent;border-left:3px solid var(--red);border-radius:10px;padding:11px 13px;font-size:12.5px;color:var(--ink);line-height:1.65;margin-top:10px}
  .warn b{color:var(--red)}
  .foot{padding:16px 20px 30px;font-size:11.5px;color:var(--ink-faint)}
  .savebar{position:sticky;bottom:0;background:var(--surface);border-top:1px solid var(--line);padding:12px 20px;display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
  .btn{font-family:inherit;font-size:13.5px;font-weight:700;padding:10px 20px;border-radius:10px;border:0;background:var(--pine);color:#fff;cursor:pointer}
  .btn.ghost{background:transparent;border:1px solid var(--line-strong);color:var(--ink-soft);font-weight:400}
  #toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);background:var(--pine-deep);color:#fff;font-size:13px;font-weight:500;padding:11px 18px;border-radius:11px;opacity:0;pointer-events:none;transition:.22s;z-index:120}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style><style>
  .backbtn{display:inline-flex;align-items:center;gap:6px;font-family:inherit;font-size:13px;font-weight:600;color:#EAF3EF;background:rgba(255,255,255,.12);border:1px solid rgba(143,201,185,.4);border-radius:10px;padding:8px 13px;cursor:pointer}
  .backbtn:hover{background:rgba(255,255,255,.22)}
  .count{font-size:12.5px;color:#BFE3D8;white-space:nowrap}
  .empty{grid-column:1/-1;padding:40px 20px;text-align:center;color:var(--ink-faint);font-size:14px}
  .cap.off{background:var(--slate-bg);color:var(--slate)}
  .cap.inact{background:var(--red-bg);color:var(--red);border-color:transparent}
  #gate{position:fixed;inset:0;z-index:200;background:var(--bg);display:grid;place-items:center;text-align:center;padding:30px}
  #gate .ring{width:44px;height:44px;border:4px solid var(--line-strong);border-top-color:var(--pine);border-radius:50%;margin:0 auto 18px;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #gate h2{font-size:18px;font-weight:700;margin-bottom:6px}
  #gate p{font-size:13.5px;color:var(--ink-soft)}
  #gate .deny{font-size:38px;margin-bottom:10px}
  #toast.err{background:#A91F12}
  .toggle:disabled{opacity:.45;cursor:wait}
  .banner{display:flex;gap:10px;background:var(--red-bg);border-left:3px solid var(--red);border-radius:10px;padding:11px 14px;font-size:13px;margin-bottom:16px;line-height:1.6}
  .banner b{color:var(--red)}
</style>

<header><div class="bar">
  <button class="backbtn" onclick="goBack()">← กลับ</button>
  <div><div class="eyebrow">SSB Smart Supply · Users &amp; Roles</div><h1>ตั้งค่าสิทธิ์แอดมิน</h1></div>
  <div class="spacer"></div><span class="count" id="cnt"></span>
</div></header>

<main>
  <div id="alertBox"></div>
  <div class="hint"><span style="font-size:15px">👆</span>
    <div><b>จิ้มการ์ดแอดมินเพื่อตั้งค่าสิทธิ์</b> — บันทึกลงตาราง <span class="mono">admins</span> ทันที<br>
    ช่อง <b>“สิทธิ์ที่ได้จริง”</b> คำนวณตามเงื่อนไขในโค้ดจริง ปรับแล้วเห็นผลก่อนบันทึก</div></div>
  <div class="list" id="list"><div class="empty">กำลังโหลด…</div></div>
</main>

<div id="scrim"></div>
<aside id="dw" role="dialog" aria-modal="true" tabindex="-1"></aside>
<div id="gate"><div class="box"><div class="ring"></div><h2>กำลังเข้าสู่ระบบ</h2><p>ตรวจสอบสิทธิ์ผู้ใช้…</p></div></div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbw4UvKuRrAQ_3Ldm8U0VJqfjfBQUSYaTEdrxkdXUVN98G68XseCquhDeXfMgU8cVYaY/exec';
const LIFF_ID='2010274217-Ot7vGhri';
let MY_UID='', ADMINS=[], NOTIFY_N=0, IDX=-1, D=null, BUSY=false;

const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function goBack(){ if(history.length>1) history.back(); else location.href='https://sadayu07ktc-droid.github.io/SSB-SMART-SUPPLY-DASHBOARD/'; }
let _t; function toast(m,err){ let e=$('#toast'); if(!e){e=document.createElement('div');e.id='toast';document.body.appendChild(e);}
  e.textContent=m; e.className='show'+(err?' err':''); clearTimeout(_t); _t=setTimeout(()=>e.className='',2600); }

const TYPES=[
  {v:'ADMIN',     t:'แอดมินปฏิบัติการ', d:'ทำงานประจำวันเต็มรูปแบบ · ได้รับงาน Packing ให้อนุมัติเสมอ'},
  {v:'MANAGER',   t:'ผู้จัดการ',        d:'เหมือนแอดมิน แต่ถ้าปิด “อนุมัติ/จัดการ” จะไม่ได้รับงาน Packing'},
  {v:'ADMIN_PK',  t:'แอดมิน Packing',   d:'เป็นฝ่ายส่งคำขอ Packing เอง — ระบบไม่ส่งงาน Packing กลับมาให้'},
  {v:'EXECUTIVE', t:'ผู้บริหาร',        d:'ดูภาพรวม · ไม่ได้รับงาน Packing ให้อนุมัติ'}
];
const packOK=(ty,mg)=> ty==='ADMIN' ? true : ty==='MANAGER' ? !!mg : false;

async function api(p){ const u=GAS_URL+'?'+Object.entries(p).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
  const r=await fetch(u); return r.json(); }

async function load(){
  const res=await api({action:'getAdminList',userId:MY_UID});
  if(res.denied){ $('#gate').innerHTML='<div class="box"><div class="deny">🚫</div><h2>ไม่มีสิทธิ์เข้าถึง</h2><p>หน้านี้สำหรับแอดมินเท่านั้น</p></div>'; return; }
  $('#gate').style.display='none';
  if(!res.ok){ $('#list').innerHTML=`<div class="empty">${esc(res.error||'โหลดข้อมูลไม่สำเร็จ')}</div>`; return; }
  ADMINS=res.admins||[]; NOTIFY_N=res.notifyCount||0; render();
}

function render(){
  $('#cnt').textContent=`${ADMINS.length} คน · รับแจ้งเตือน ${NOTIFY_N}`;
  $('#alertBox').innerHTML = NOTIFY_N===0
    ? `<div class="banner"><span style="font-size:15px">⚠️</span><div><b>ไม่มีแอดมินที่รับแจ้งเตือนเลย</b><br>
        ระบบจะส่งแจ้งเตือนออเดอร์ใหม่ · ชั่งเสร็จ · ขอลา · แจ้งซ่อม ไม่ได้ — เปิดให้อย่างน้อย 1 คน</div></div>` : '';
  $('#list').innerHTML = ADMINS.length ? ADMINS.map((a,i)=>card(a,i)).join('')
    : '<div class="empty">ยังไม่มีแอดมินในระบบ</div>';
}
function card(a,i){
  return `<button class="card" onclick="open_(${i})">
    <span class="edge"></span><span class="avatar">${esc((a.name||'?').trim()[0]||'?')}</span>
    <span class="who">
      <span class="name">${esc(a.name||'—')}</span>
      <span class="ln mono">${esc(a.phone||'—')}</span>
      <span class="tybadge">${esc(a.type||'ไม่ระบุ')}</span>
      <span class="caps">
        <span class="cap ${a.notify?'on':'off'}">${a.notify?'✓':'✕'} แจ้งเตือน</span>
        <span class="cap ${a.manage?'on':'off'}">${a.manage?'✓':'✕'} อนุมัติ/จัดการ</span>
        ${a.active?'':'<span class="cap inact">⚠ ปิดใช้งานอยู่</span>'}
      </span>
    </span><span class="go">›</span></button>`;
}

/* สิทธิ์ที่ได้จริง — ลอกเงื่อนไขจากโค้ดจริง */
function effective(d){
  const pk = d.type==='ADMIN' ? {v:true,why:'ADMIN ได้เสมอ'}
    : d.type==='MANAGER' ? (d.manage?{v:true,why:'MANAGER + เปิดอนุมัติ/จัดการ'}:{v:false,why:'MANAGER ที่ปิดอนุมัติ/จัดการ'})
    : d.type==='ADMIN_PK' ? {v:false,why:'ADMIN_PK เป็นผู้ส่งคำขอเอง'}
    : {v:false,why:'EXECUTIVE ถูกตัดออกในโค้ด'};
  const notifyReal = d.notify && d.active;
  return [
    {ic:'🔑',lb:'เข้าหน้าแอดมินทุกหน้า',st:'y',tx:'ได้',note:'มีชื่อในตาราง admins = เข้าได้เลย'},
    {ic:'🔔',lb:'รับแจ้งเตือน LINE',st:notifyReal?'y':'n',tx:notifyReal?'ได้รับ':'ไม่ได้รับ',
      note:!d.notify?'ปิดรับแจ้งเตือนอยู่':(!d.active?'เปิดไว้ แต่บัญชีถูกปิดใช้งาน → ระบบข้าม':'ออเดอร์ใหม่ · ชั่งเสร็จ · ลา · แจ้งซ่อม')},
    {ic:'📦',lb:'ได้รับงาน Packing ให้อนุมัติ',st:pk.v?'y':'n',tx:pk.v?'ได้รับ':'ไม่ได้รับ',note:pk.why},
    {ic:'📊',lb:'เข้า Dashboard',st:'w',tx:'ไม่มีผล',note:'ค่าในฐาน: "'+(d.dashRaw||'(ว่าง)')+'" — ยังไม่มีโค้ดตรวจค่านี้'}
  ];
}

function open_(i){ IDX=i; D=Object.assign({},ADMINS[i]);
  $('#dw').classList.add('on'); $('#scrim').classList.add('on'); document.body.style.overflow='hidden'; draw(); }

function draw(){
  const eff=effective(D), o=ADMINS[IDX];
  const dirty = D.type!==o.type || D.notify!==o.notify || D.manage!==o.manage;
  $('#dw').innerHTML=`
    <div class="dwhead"><div class="top"><h2>${esc(D.name||'—')}</h2>
      <button class="xbtn" onclick="close_()" aria-label="ปิด">✕</button></div>
      <div class="sub">${esc(D.phone||'—')} · <span class="mono" style="font-size:11px">${esc(D.uid)}</span>
      ${D.active?'':' · <b style="color:#F2D28C">บัญชีถูกปิดใช้งาน</b>'}</div></div>

    <div class="sect"><h3>ประเภทแอดมิน</h3>
      ${TYPES.map(t=>`<div class="opt ${D.type===t.v?'sel':''}" onclick="setType('${t.v}')" role="button" tabindex="0">
        <span class="radio"></span><span style="flex:1">
        <span class="t">${esc(t.t)} <span class="code">${t.v}</span></span>
        <span class="d">${esc(t.d)}</span></span></div>`).join('')}
    </div>

    <div class="sect"><h3>สิทธิ์</h3>
      <div class="sw"><div class="body"><div class="t">รับแจ้งเตือน</div>
        <div class="d">ได้รับ LINE เมื่อมีออเดอร์ใหม่ · ชั่งน้ำหนักเสร็จ · ขอลา · แจ้งซ่อม</div>
        <div class="val">รับแจ้งเตือน = "${D.notify?'รับแจ้งเตือน':'(ว่าง)'}"</div></div>
        <button class="toggle ${D.notify?'on':''}" onclick="tog('notify')"><span class="knob"></span></button></div>

      <div class="sw"><div class="body"><div class="t">อนุมัติ / จัดการ</div>
        <div class="d">ปิด = บันทึกเป็น “ดูอย่างเดียว” · <b>มีผลเฉพาะประเภท MANAGER</b></div>
        <div class="val">อนุมัติ/จัดการ = "${D.manage?'(ว่าง = จัดการได้)':'ดูอย่างเดียว'}"</div></div>
        <button class="toggle ${D.manage?'on':''}" onclick="tog('manage')"><span class="knob"></span></button></div>

      <div class="sw" style="opacity:.6"><div class="body"><div class="t">เข้า Dashboard</div>
        <div class="d">⚠️ ยังไม่มีโค้ดตรวจค่านี้ — แสดงค่าปัจจุบันอย่างเดียว แก้ไม่ได้จากหน้านี้</div>
        <div class="val">ค่าในฐาน: "${esc(D.dashRaw||'(ว่าง)')}"</div></div></div>
    </div>

    <div class="sect"><h3>สิทธิ์ที่ได้จริง</h3>
      <div class="eff">${eff.map(e=>`<div class="row"><span class="ic">${e.ic}</span>
        <span class="lb">${esc(e.lb)}<div style="font-size:11px;color:var(--ink-faint);margin-top:1px">${esc(e.note)}</div></span>
        <span class="st ${e.st}">${esc(e.tx)}</span></div>`).join('')}</div>
      <div class="warn"><span style="font-size:14px">⚠️</span>
        <div><b>ทุกคนในตารางนี้เข้าหน้าแอดมินได้หมด</b> — ระบบตรวจแค่ว่ามีชื่ออยู่ไหม ไม่ได้ดูประเภทหรือสิทธิ์
        ถ้าต้องการจำกัดผู้บริหารให้เข้าได้บางหน้า ต้องแก้โค้ดตรวจสิทธิ์เพิ่ม</div></div>
    </div>

    <div class="savebar">
      <button class="btn ghost" onclick="close_()">${dirty?'ยกเลิก':'ปิด'}</button>
      <button class="btn" onclick="save()" ${dirty&&!BUSY?'':'disabled style="opacity:.45;cursor:not-allowed"'}>
        ${BUSY?'กำลังบันทึก…':'บันทึก'}</button>
    </div>
    <div class="foot">บันทึกลงคอลัมน์: ประเภท · รับแจ้งเตือน · อนุมัติ/จัดการ (ตาราง admins)</div>`;
  $('#dw').focus();
}
function setType(v){ D.type=v; draw(); }
function tog(k){ D[k]=!D[k]; draw(); }

async function save(){
  if(BUSY) return;
  BUSY=true; draw();
  try{
    const r=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({
      action:'saveAdminPerms', userId:MY_UID, targetUid:D.uid,
      type:D.type, notify:D.notify, manage:D.manage })});
    const d=await r.json();
    if(d.ok){
      ADMINS[IDX]=Object.assign({},D,{packing:packOK(D.type,D.manage)});
      if(typeof d.notifyCount==='number') NOTIFY_N=d.notifyCount;
      render(); toast('บันทึกสิทธิ์ '+(D.name||'')+' แล้ว');
      if(d.warn) setTimeout(()=>toast(d.warn,true),1200);
      BUSY=false; close_(); return;
    }
    toast('❌ '+(d.error||'บันทึกไม่สำเร็จ'),true);
  }catch(e){ toast('❌ '+e,true); }
  BUSY=false; draw();
}
function close_(){ $('#dw').classList.remove('on'); $('#scrim').classList.remove('on'); document.body.style.overflow=''; }
$('#scrim').addEventListener('click',()=>{ if(!BUSY) close_(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&!BUSY) close_(); });

(async function(){
  try{
    await liff.init({liffId:LIFF_ID});
    if(!liff.isLoggedIn()){ liff.login({redirectUri:location.href}); return; }
    const p=await liff.getProfile(); MY_UID=p.userId||'';
    if(!MY_UID){ $('#gate').innerHTML='<div class="box"><div class="deny">⚠️</div><h2>ไม่พบ LINE UID</h2><p>เปิดผ่านแอป LINE อีกครั้ง</p></div>'; return; }
    load();
  }catch(e){ $('#gate').innerHTML='<div class="box"><div class="deny">⚠️</div><h2>เชื่อมต่อ LINE ไม่สำเร็จ</h2><p>'+esc(e)+'</p></div>'; }
})();
</script>
