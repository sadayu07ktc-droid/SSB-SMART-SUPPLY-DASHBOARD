<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ตั้งค่าต้นทุน/ค่าแรง · SSB</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root{--bg:#eef1f4;--card:#fff;--card2:#f6f8fa;--line:#e2e6ea;--line2:#cfd5db;--txt:#1a2530;--txt2:#6b7785;--primary:#1f8a52;--danger:#c8352f;--radius:8px}
  @media(prefers-color-scheme:dark){:root{--bg:#0f1519;--card:#182028;--card2:#1f2830;--line:#2a343d;--line2:#3a4650;--txt:#e6ebf0;--txt2:#8a97a3;--primary:#2ea567;--danger:#e5645d}}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,"Segoe UI","Noto Sans Thai",sans-serif;line-height:1.5;padding:16px 12px 90px}
  .wrap{max-width:820px;margin:0 auto}
  .bar{display:flex;align-items:center;gap:10px;padding:2px 2px 14px}
  .logo{width:38px;height:38px;border-radius:10px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700}
  h1{font-size:17px;margin:0;font-weight:700}.sub{font-size:12px;color:var(--txt2)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(20,40,60,.05)}
  .ch{font-size:14px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:7px}
  .note{font-size:11.5px;color:var(--txt2);margin-bottom:10px;line-height:1.6}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px 14px}
  label{font-size:11.5px;color:var(--txt2);display:block}
  input{width:100%;margin-top:3px;padding:7px 9px;border:1px solid var(--line2);border-radius:var(--radius);background:var(--card2);color:var(--txt);font:inherit;font-size:14px}
  input[readonly]{opacity:.6}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px}
  th,td{padding:6px 5px;border-bottom:1px solid var(--line);text-align:center}
  th{font-size:11px;color:var(--txt2)}
  td:first-child,th:first-child{text-align:left}
  td input{width:64px;margin:0;text-align:center;padding:5px}
  .tag{font-size:10px;padding:2px 8px;border-radius:999px;background:var(--card2);color:var(--txt2)}
  .save{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--line);padding:12px;display:flex;gap:10px;justify-content:center;z-index:10}
  .btn{padding:11px 24px;border:0;border-radius:10px;background:var(--primary);color:#fff;font:inherit;font-size:14px;font-weight:700;cursor:pointer}
  .btn.ghost{background:transparent;border:1px solid var(--line2);color:var(--txt2);font-weight:400}
  .formula{background:var(--card2);border-left:3px solid var(--primary);border-radius:6px;padding:10px 12px;font-size:12px;color:var(--txt2);line-height:1.8;font-family:"IBM Plex Mono",monospace}
  .msg{text-align:center;color:var(--txt2);padding:30px}
  .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--primary);color:#fff;padding:10px 20px;border-radius:999px;font-size:13.5px;font-weight:600;z-index:50;opacity:0;transition:.3s;pointer-events:none}
  .toast.on{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <div class="bar">
    <button onclick="goBack()" style="border:1px solid var(--line2);background:var(--card);color:var(--txt);border-radius:10px;width:38px;height:38px;font-size:18px;cursor:pointer">←</button>
    <div class="logo">⚙️</div>
    <div><h1>ตั้งค่าต้นทุน / ค่าแรง</h1><div class="sub">แก้แล้วบันทึกกลับฐานข้อมูล — มีผลกับเที่ยว<b>ที่คิดใหม่</b>เท่านั้น</div></div>
  </div>
  <div id="body"><div class="msg">กำลังเข้าสู่ระบบ…</div></div>
</div>

<div class="save" id="saveBar" style="display:none">
  <button class="btn ghost" onclick="location.reload()">ยกเลิก</button>
  <button class="btn" id="saveBtn">💾 บันทึกเข้าฐาน</button>
</div>
<div class="toast" id="toast"></div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbw4UvKuRrAQ_3Ldm8U0VJqfjfBQUSYaTEdrxkdXUVN98G68XseCquhDeXfMgU8cVYaY/exec';
const LIFF_ID='2010274217-Ot7vGhri';
let MY_UID='', DATA=null;
const $=id=>document.getElementById(id);
function toast(t){const e=$('toast');e.textContent=t;e.classList.add('on');setTimeout(()=>e.classList.remove('on'),2200);}
function goBack(){ if(history.length>1){history.back();} else {location.href='https://sadayu07ktc-droid.github.io/SSB-SMART-SUPPLY-DASHBOARD/';} }

// ป้ายชื่อ param กลาง
const PLBL={run_rate_per_hr:'เลทค่าวิ่ง (บ./ชม.)',load_rate_per_hr:'ค่าขึ้น-ลง (บ./ชม.)',fuel_rate_wage:'เลทน้ำมันคิดค่าแรง (บ./ล.)',heavy_pct:'ถ่วงหนัก (%)',light_pct:'ถ่วงเบา (%)',bonus_pct:'โบนัส % ค่าเที่ยว',tarp_fee:'ค่าคลุมผ้าใบ (บ.)'};
const PORDER=['run_rate_per_hr','load_rate_per_hr','fuel_rate_wage','heavy_pct','light_pct','bonus_pct','tarp_fee'];

async function load(){
  const r=await fetch(GAS_URL+'?action=getWageSettings&userId='+encodeURIComponent(MY_UID));
  const d=await r.json();
  if(d.denied){$('body').innerHTML='<div class="msg" style="color:var(--danger)">ไม่มีสิทธิ์ (เฉพาะแอดมิน)</div>';return;}
  if(!d.ok){$('body').innerHTML='<div class="msg">'+(d.error||'ผิดพลาด')+'</div>';return;}
  DATA=d; render(); $('saveBar').style.display='flex';
}

function render(){
  const d=DATA;
  let h='';

  // สูตรอธิบาย
  h+='<div class="card"><div class="ch">🧮 คิดค่าแรงยังไง</div><div class="formula">'
    +'ค่าวิ่งแต่ละขา = เลทค่าวิ่ง × ชม.(ขั้นบันไดตามระยะ) × 2 × %หนัก/เบา<br>'
    +'+ ค่าขึ้น-ลง (ตามประเภทงาน) + ค่าคลุมผ้าใบ<br>'
    +'± น้ำมันคนขับ = (ลิตรตามเกณฑ์ − เติมจริง) × เลทน้ำมัน<br>'
    +'+ โบนัส % → <b>ค่าแรงสุทธิ</b> (ล็อก+snapshot ตอนจบงาน)'
    +'</div></div>';

  // param กลาง
  h+='<div class="card"><div class="ch">💵 ค่าตั้งกลาง (cost_params)</div><div class="grid">';
  PORDER.forEach(k=>{ if(d.params[k]) h+=`<label>${PLBL[k]||k}<input type="number" step="any" data-p="${k}" value="${d.params[k].value}"></label>`; });
  h+='</div></div>';

  // เกณฑ์น้ำมัน + ความเร็ว ตามช่วง×รุ่น
  ['360','240'].forEach(m=>{
    const tiers=d.speedTier.filter(t=>t.model===m).sort((a,b)=>(a.seq-b.seq));
    const fw=d.fuelWeight.find(f=>f.model===m)||{};
    h+=`<div class="card"><div class="ch">🚚 เกณฑ์รุ่น ${m} <span class="tag">ตามช่วงระยะ</span></div>`;
    h+='<table><thead><tr><th>ช่วง (เพดาน กม.)</th><th>ความเร็ว</th><th>กม./ล.</th></tr></thead><tbody>';
    tiers.forEach(t=>{ h+=`<tr><td><input type="number" data-st="${m}|${t.seq}|max_km" value="${t.max_km==null?'':t.max_km}" placeholder="∞"> กม.</td><td><input type="number" data-st="${m}|${t.seq}|speed_kmph" value="${t.speed_kmph}"></td><td><input type="number" step="0.05" data-st="${m}|${t.seq}|kmpl" value="${t.kmpl}"></td></tr>`; });
    h+='</tbody></table>';
    h+=`<div class="grid" style="margin-top:10px"><label>เกณฑ์รถหนัก (กม./ล.)<input type="number" step="0.05" data-fw="${m}|kmpl_heavy" value="${fw.kmpl_heavy||''}"></label><label>เกณฑ์รถเบา (กม./ล.)<input type="number" step="0.05" data-fw="${m}|kmpl_light" value="${fw.kmpl_light||''}"></label></div>`;
    h+='</div>';
  });

  // เวลาขึ้น-ลง ต่องาน
  h+='<div class="card"><div class="ch">⏱️ เวลาขึ้น-ลง ต่อประเภทงาน (นาที)</div><table><thead><tr><th>งาน</th><th>ขึ้น</th><th>ลง</th></tr></thead><tbody>';
  d.jobTypes.forEach(j=>{ h+=`<tr><td>${j.job_type}</td><td><input type="number" data-jt="${j.job_type}|up_min" value="${j.up_min}"></td><td><input type="number" data-jt="${j.job_type}|down_min" value="${j.down_min}"></td></tr>`; });
  h+='</tbody></table></div>';

  // ราคาน้ำมันกลางวันนี้
  const today=new Date().toISOString().slice(0,10);
  const todayRow=(d.fuelDaily||[]).find(f=>String(f.price_date).slice(0,10)===today);
  h+=`<div class="card"><div class="ch">⛽ ราคาน้ำมันกลางรายวัน</div><div class="note">เจ้าหน้าที่ปั๊มแจ้ง → กรอกที่นี่ · ใช้คิดค่าน้ำมันเติมโรงงาน (เติมนอกใช้ใบเสร็จ)</div>`;
  h+=`<div class="grid"><label>วันที่<input type="date" id="fpDate" value="${today}"></label><label>ราคา (บ./ล.)<input type="number" step="0.25" id="fpPrice" value="${todayRow?todayRow.price_per_liter:''}" placeholder="เช่น 32.00"></label></div>`;
  if(d.fuelDaily&&d.fuelDaily.length){ h+='<div class="note" style="margin-top:8px">ล่าสุด: '+d.fuelDaily.slice(0,5).map(f=>String(f.price_date).slice(5,10)+'='+f.price_per_liter).join(' · ')+'</div>'; }
  h+='</div>';

  $('body').innerHTML=h;
}

async function save(){
  const params={}; document.querySelectorAll('[data-p]').forEach(i=>params[i.dataset.p]=parseFloat(i.value)||0);
  const stMap={};
  document.querySelectorAll('[data-st]').forEach(i=>{const[m,seq,f]=i.dataset.st.split('|');const k=m+'|'+seq;stMap[k]=stMap[k]||{model:m,seq:+seq};stMap[k][f]=(i.value===''?null:parseFloat(i.value));});
  const speedTier=Object.values(stMap);
  const fwMap={}; document.querySelectorAll('[data-fw]').forEach(i=>{const[m,f]=i.dataset.fw.split('|');fwMap[m]=fwMap[m]||{model:m};fwMap[m][f]=parseFloat(i.value)||0;});
  const fuelWeight=Object.values(fwMap);
  const jtMap={}; document.querySelectorAll('[data-jt]').forEach(i=>{const[j,f]=i.dataset.jt.split('|');jtMap[j]=jtMap[j]||{job_type:j};jtMap[j][f]=parseInt(i.value)||0;});
  const jobTypes=Object.values(jtMap);
  const fuelDaily=$('fpPrice').value?{date:$('fpDate').value,price:parseFloat($('fpPrice').value)}:null;

  const payload={action:'saveWageSettings',userId:MY_UID,params,speedTier,fuelWeight,jobTypes,fuelDaily};
  $('saveBtn').textContent='กำลังบันทึก…';$('saveBtn').disabled=true;
  try{
    const r=await fetch(GAS_URL,{method:'POST',body:JSON.stringify(payload)});
    const d=await r.json();
    if(d.ok){toast('✅ บันทึกเข้าฐานแล้ว');}
    else toast('❌ '+(d.error||d.denied?'ไม่มีสิทธิ์':'ผิดพลาด'));
  }catch(e){toast('❌ '+e);}
  $('saveBtn').textContent='💾 บันทึกเข้าฐาน';$('saveBtn').disabled=false;
}
$('saveBtn').onclick=save;

(async function(){
  try{
    await liff.init({liffId:LIFF_ID});
    if(!liff.isLoggedIn()){liff.login({redirectUri:location.href});return;}
    const p=await liff.getProfile(); MY_UID=p.userId||'';
    if(!MY_UID){$('body').innerHTML='<div class="msg" style="color:var(--danger)">ไม่พบ LINE UID</div>';return;}
    load();
  }catch(e){$('body').innerHTML='<div class="msg">LIFF error: '+e+'</div>';}
})();
</script>
</body>
</html>
